# ─────────────────────────────────────────────────────────────────────────────
# QMDJ Calendar — CI
#
# Matches the repo as it actually is today: a single-package Vite + React app
# with the Zhirun engine vendored under src/engine/. Two gates that mean
# something and stay green:
#   1. typecheck  — tsc --noEmit over src/ (catches engine + UI type breaks)
#   2. build      — vite build must produce a production bundle
#
# The build artifact is uploaded so you can preview any commit's output.
#
# Runs on PRs into main, on pushes to main, and on demand.
#
# HARDENING (later, not blocking):
#   • Commit a package-lock.json and switch `npm install` → `npm ci` for
#     reproducible installs (also lets setup-node cache by the lockfile hash).
#   • Add a test job once a runner (e.g. Vitest) and the first golden
#     fixtures land — see tooling/ and packages/engine/tests/ scaffolding.
#   • Add a deploy job when a production host is chosen.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json   # no lockfile committed yet

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build (vite)
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: qmdj-calendar-dist-${{ github.sha }}
          path: dist
          retention-days: 14
