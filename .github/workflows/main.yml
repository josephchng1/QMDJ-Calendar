# ─────────────────────────────────────────────────────────────────────────────
# QMDJ — Main branch (post-merge) workflow
#
# On every merge to main:
#   1. Re-run the full test suite (no path filtering — everything runs)
#   2. Produce the production build artifact
#   3. Deploy — currently a STUB, see ⚠ below
#
# ⚠ DEPLOY TARGET NOT YET DEFINED.
#   Manus is retired; StackBlitz is a preview/testing environment, not a
#   production host. When a host is chosen (e.g. Vercel, Netlify,
#   Cloudflare Pages for apps/web + a Node host for apps/server), replace
#   the `deploy` job body and enable `post-deploy-smoke`.
# ─────────────────────────────────────────────────────────────────────────────
name: Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false   # never cancel a deploy mid-flight

jobs:
  full-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - name: Validate golden fixtures
        run: node tooling/validate-fixtures.mjs
      - name: Engine suite (golden, boundary, invariants, patterns)
        run: |
          pnpm --filter @qmdj/engine test:golden
          pnpm --filter @qmdj/engine test:boundary
          pnpm --filter @qmdj/engine test:invariants
          pnpm --filter @qmdj/engine test:patterns
      - name: Browser parity
        run: |
          pnpm exec playwright install chromium --with-deps
          pnpm --filter @qmdj/engine test:parity
      - name: Server contract tests
        run: pnpm --filter @qmdj/server test:contract
      - name: Perf budgets
        run: pnpm --filter @qmdj/engine test:perf

  build-artifact:
    runs-on: ubuntu-latest
    needs: full-suite
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: qmdj-production-build-${{ github.sha }}
          path: |
            apps/web/dist
            apps/server/dist
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: build-artifact
    steps:
      - name: Deploy (stub)
        run: |
          echo "::warning::No production deploy target configured yet."
          echo "When a host is chosen, replace this step with the host's"
          echo "deploy action/CLI and add required secrets in repo settings."

  # post-deploy-smoke:
  #   Enable once `deploy` is real. It should:
  #     1. Hit the live URL and assert the calendar page renders (HTTP 200
  #        + a known DOM marker).
  #     2. Compute one known golden chart through the live tRPC endpoint
  #        (e.g. qmdj.chart for the 壬午日庚子时 fixture instant) and
  #        deep-compare against the fixture's expected values.
  #   If this fails, you know within minutes — not when a client opens a
  #   bad chart.
